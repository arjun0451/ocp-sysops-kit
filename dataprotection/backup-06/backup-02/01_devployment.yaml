apiVersion: apps/v1
kind: Deployment
metadata:
  name: bck02-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bck02-app
  template:
    metadata:
      labels:
        app: bck02-app
    spec:
      containers:
      - name: app
        image: quay.io/arjun0451/backup/backup-nodejs-dep-pvc:v1
        ports:
        - containerPort: 8080
        volumeMounts:
        - mountPath: /data
          name: storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: bck02-pvc
