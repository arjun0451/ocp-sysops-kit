name: Build and Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.0)'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: ocp-upgrade-healthcheck

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download oc and jq binaries
        run: |
          chmod +x prepare-bins.sh
          ./prepare-bins.sh --arch amd64

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push to Quay.io
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            quay.io/${{ secrets.QUAY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            quay.io/${{ secrets.QUAY_ORG }}/${{ env.IMAGE_NAME }}:latest

      # Optional: Docker Hub — add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets to enable
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      # - name: Push to Docker Hub
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: Containerfile
      #     push: true
      #     tags: |
      #       docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
      #       docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
